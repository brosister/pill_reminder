name: pill_reminder
description: "Pill Reminder - medication tracker with server-driven AdMob config."
publish_to: 'none'
version: 1.0.4+6

environment:
  sdk: ^3.9.2
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.5.0
  google_mobile_ads: ^6.0.0
  flutter_local_notifications: ^18.0.1
  fluttertoast: ^8.2.8
  shared_preferences: ^2.3.3
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
